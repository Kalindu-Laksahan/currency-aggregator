# ================================================================
# ExchangeWatch LK — Rate Snapshot Workflow
# ================================================================
# Runs 3x daily (UTC). Node.js 24 is pre-installed on ubuntu-latest
# — no setup-node action needed.
#
# Schedule:
#   07:45 UTC → Morning   (appends intraday entry)
#   13:45 UTC → Afternoon (appends intraday entry)
#   23:45 UTC → Evening   (consolidates: keeps ONE entry per day,
#                           max 30 days in history.json)
# ================================================================

name: Rate Snapshots (Morning / Afternoon / Evening)

on:
  schedule:
    - cron: '45 7  * * *'   # 07:45 UTC — Morning
    - cron: '45 13 * * *'   # 13:45 UTC — Afternoon
    - cron: '45 23 * * *'   # 23:45 UTC — Evening (consolidates day)
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type (morning | afternoon | evening)'
        required: false
        default: 'evening'

permissions:
  contents: write

jobs:
  snapshot:
    name: Capture Rate Snapshot
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Detect run type ─────────────────────────────────────
      - name: Detect run type
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.run_type }}"
            [ -z "$TYPE" ] && TYPE="evening"
          else
            HOUR=$(date -u +"%H")
            case "$HOUR" in
              07) TYPE="morning"   ;;
              13) TYPE="afternoon" ;;
              *)  TYPE="evening"   ;;
            esac
          fi
          echo "type=${TYPE}" >> "$GITHUB_OUTPUT"
          echo "[Snapshot] Run type detected: ${TYPE}"

      # ── 3. Write the Node.js snapshot script to a temp file ────
      #       (Avoids heredoc parsing issues; Node 24 is already
      #        pre-installed on ubuntu-latest — no setup needed)
      - name: Write snapshot script
        shell: bash
        run: |
          mkdir -p /tmp/snapshot
          cat << 'SCRIPTEOF' > /tmp/snapshot/run.js
          'use strict';
          const https = require('https');
          const fs    = require('fs');
          const path  = require('path');

          // ── Config ─────────────────────────────────────────────
          const SHEET_ID      = '1ZXvoy_yDJEFN5LA3mrCFzg7L2REZ3gY4X4mQIXJ-r1Q';
          const BUYING_SHEET  = 'Buying Rates Dashboard';
          const SELLING_SHEET = 'Selling Rates Dashboard';
          const HISTORY_FILE  = process.env.HISTORY_FILE;
          const RUN_TYPE      = process.env.RUN_TYPE || 'evening';
          const MAX_DAYS      = 30;

          if (!HISTORY_FILE) {
            console.error('[Snapshot] ERROR: HISTORY_FILE env var not set');
            process.exit(1);
          }

          console.log('[Snapshot] HISTORY_FILE:', HISTORY_FILE);
          console.log('[Snapshot] RUN_TYPE    :', RUN_TYPE);
          console.log('[Snapshot] Node version:', process.version);

          const CURRENCIES = [
            { code: 'USD', idx: 4  }, { code: 'GBP', idx: 5  },
            { code: 'EUR', idx: 6  }, { code: 'AED', idx: 7  },
            { code: 'AUD', idx: 8  }, { code: 'BHD', idx: 9  },
            { code: 'CAD', idx: 10 }, { code: 'CHF', idx: 11 },
            { code: 'CNY', idx: 12 }, { code: 'DKK', idx: 13 },
            { code: 'HKD', idx: 14 }, { code: 'JOD', idx: 15 },
            { code: 'JPY', idx: 16 }, { code: 'KWD', idx: 17 },
            { code: 'NOK', idx: 18 }, { code: 'NZD', idx: 19 },
            { code: 'OMR', idx: 20 }, { code: 'QAR', idx: 21 },
            { code: 'RMB', idx: 22 }, { code: 'SAR', idx: 23 },
            { code: 'SEK', idx: 24 }, { code: 'SGD', idx: 25 },
            { code: 'TBH', idx: 26 }, { code: 'ZAR', idx: 27 },
          ];

          // ── Helpers ────────────────────────────────────────────
          function httpsGet(url) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, { timeout: 20000 }, res => {
                let body = '';
                console.log('[Snapshot] HTTP', res.statusCode, 'for', url.slice(0, 80) + '...');
                if (res.statusCode !== 200) {
                  reject(new Error('HTTP ' + res.statusCode));
                  return;
                }
                res.on('data', c => body += c);
                res.on('end',  () => resolve(body));
              });
              req.on('error',   err => reject(err));
              req.on('timeout', ()  => { req.destroy(); reject(new Error('Timeout: ' + url)); });
            });
          }

          function parseGviz(body, sheetName) {
            const start = body.indexOf('google.visualization.Query.setResponse(');
            if (start === -1) throw new Error('GViz marker not found for: ' + sheetName);
            const jStart = body.indexOf('(', start) + 1;
            const jEnd   = body.lastIndexOf(')');
            if (jStart <= 0 || jEnd <= jStart) throw new Error('GViz JSON bounds invalid for: ' + sheetName);
            return JSON.parse(body.slice(jStart, jEnd));
          }

          function cleanVal(v) {
            if (v === null || v === undefined) return null;
            if (typeof v === 'number') return isFinite(v) ? parseFloat(v.toFixed(4)) : null;
            const s = String(v).trim();
            if (!s || s==='-' || s==='--' || s==='0' || s.toLowerCase()==='n/a' || s.toLowerCase()==='na') return null;
            const n = parseFloat(s.replace(/,/g, ''));
            return isNaN(n) ? null : parseFloat(n.toFixed(4));
          }

          function parseSheet(resp) {
            const rows = resp?.table?.rows ?? [];
            const out  = {};
            for (const row of rows) {
              if (!row?.c?.[0]?.v) continue;
              const bank = String(row.c[0].v).trim();
              if (!bank || bank.toLowerCase() === 'bank') continue;
              const rates = {};
              for (const { code, idx } of CURRENCIES) {
                const cell = row.c[idx];
                rates[code] = cleanVal(cell?.v ?? cell?.f ?? null);
              }
              out[bank] = rates;
            }
            return out;
          }

          // ── Main ───────────────────────────────────────────────
          (async () => {
            const today   = new Date().toISOString().split('T')[0];
            const timeTag = RUN_TYPE === 'morning' ? '07:45' : RUN_TYPE === 'afternoon' ? '13:45' : '23:45';

            // 1. Fetch both sheets
            console.log('[Snapshot] Fetching buying sheet...');
            const buyBody  = await httpsGet('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(BUYING_SHEET));
            console.log('[Snapshot] Fetching selling sheet...');
            const sellBody = await httpsGet('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SELLING_SHEET));

            const buying  = parseSheet(parseGviz(buyBody,  BUYING_SHEET));
            const selling = parseSheet(parseGviz(sellBody, SELLING_SHEET));
            const banks   = Object.keys(buying).length;
            console.log('[Snapshot] Banks parsed:', banks);
            if (banks === 0) throw new Error('No bank data returned — check sheet is public');

            // 2. Load history
            const histDir = path.dirname(HISTORY_FILE);
            if (!fs.existsSync(histDir)) fs.mkdirSync(histDir, { recursive: true });
            let history = [];
            if (fs.existsSync(HISTORY_FILE)) {
              try { history = JSON.parse(fs.readFileSync(HISTORY_FILE, 'utf8')); }
              catch (e) { console.warn('[Snapshot] history.json parse error, starting fresh:', e.message); }
              if (!Array.isArray(history)) history = [];
            }
            console.log('[Snapshot] Loaded', history.length, 'existing entries');

            // 3. Build entry
            const entry = { date: today, time: timeTag, buying, selling };

            if (RUN_TYPE === 'evening') {
              // CONSOLIDATE: remove all of today's entries, keep only this final one
              const before = history.length;
              history = history.filter(e => e.date !== today);
              if (before - history.length > 0)
                console.log('[Snapshot] Evening consolidation: removed', before - history.length, 'intraday entries for', today);
              history.push(entry);
              history = history.slice(-MAX_DAYS);
              console.log('[Snapshot] After consolidation:', history.length, 'daily entries (max', MAX_DAYS, ')');
            } else {
              // INTRADAY: remove same-time duplicate, then append
              history = history.filter(e => !(e.date === today && e.time === timeTag));
              history.push(entry);
              history = history.slice(-(MAX_DAYS * 3));
              console.log('[Snapshot] Intraday (' + RUN_TYPE + '):', history.length, 'total entries');
            }

            // 4. Write
            fs.writeFileSync(HISTORY_FILE, JSON.stringify(history, null, 2), 'utf8');
            console.log('[Snapshot] Written successfully for', today, timeTag);
          })().catch(err => {
            console.error('[Snapshot] FATAL ERROR:', err.message);
            console.error(err.stack);
            process.exit(1);
          });
          SCRIPTEOF
          echo "[Setup] Snapshot script written to /tmp/snapshot/run.js"

      # ── 4. Run the snapshot script ─────────────────────────────
      - name: Run snapshot script
        shell: bash
        env:
          RUN_TYPE: ${{ steps.detect.outputs.type }}
          HISTORY_FILE: ${{ github.workspace }}/public/data/history.json
        run: |
          echo "[Runner] Node version: $(node --version)"
          echo "[Runner] RUN_TYPE: ${RUN_TYPE}"
          echo "[Runner] HISTORY_FILE: ${HISTORY_FILE}"
          node /tmp/snapshot/run.js

      # ── 5. Commit & push ───────────────────────────────────────
      - name: Commit and push history update
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/history.json
          if git diff --cached --quiet; then
            echo "[Git] No changes to commit — skipping."
          else
            DATE=$(date -u +"%Y-%m-%d")
            TIME=$(date -u +"%H:%M")
            TYPE="${{ steps.detect.outputs.type }}"
            git commit -m "chore(snapshot): ${TYPE} capture ${DATE} ${TIME} UTC [skip ci]"
            git push origin main
            echo "[Git] Pushed ${TYPE} snapshot for ${DATE} ${TIME} UTC"
          fi
